apiVersion: 1

datasources:
  - name: Redis
    uid: redis
    type: redis-datasource
    access: proxy
    url: redis:6379
    isDefault: false
    jsonData:
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0

  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: lume
    user: lume
    isDefault: true
    secureJsonData:
      password: lume
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
